name: Build Node Cache

inputs:
  node_version:
    required: true
  os:
    required: true
  arch:
    required: true
  token:
    required: true
  run_id:
    required: true
  ccache_dir:
    required: true

runs:
  using: composite

  steps:
    - name: Checkout Node.js Source Code
      shell: bash
      run: |
        curl -L -o node.tar.gz \
          https://github.com/nodejs/node/archive/refs/tags/v${{ inputs.node_version }}.tar.gz
        tar -zxf node.tar.gz
        mv node-${{ inputs.node_version }} node
        rm node.tar.gz

    - name: Setup ccache
      shell: bash
      run: |
        mkdir -p "${{ inputs.ccache_dir }}"
        ccache --set-config=max_size=10G
        ccache --zero-stats

    - name: Setup MUSL
      shell: bash
      if: ${{ (inputs.os == 'alpine' || inputs.os == 'linuxstatic') && inputs.arch == 'arm64' }}
      run: |
        curl -LO https://github.com/lovell/aarch64-linux-musl-crosstools/archive/refs/heads/main.zip
        unzip main.zip
        mv aarch64-linux-musl-crosstools-main/aarch64-linux-musl-cross /usr/local
        rm -rf aarch64-linux-musl-crosstools-main main.zip

    - name: Configure
      shell: bash
      env:
        OS: ${{ inputs.os }}
      working-directory: node
      run: |
        export PATH="/usr/local/aarch64-linux-musl-cross/bin:$PATH"
        BUILD_ARGS="--enable-lto --without-inspector --without-npm --without-intl"

        case "$OS" in
          linuxstatic)
            BUILD_ARGS="$BUILD_ARGS --fully-static"
            ;;
        esac

        if [[ ("$OS" == "alpine" || "$OS" == "linuxstatic")  && "$ARCH" == "arm64" ]]; then
          case "$OS" in
            linuxstatic)
              export CC="aarch64-linux-musl-gcc -static"
              export CXX="aarch64-linux-musl-g++ -static"
              ;;
            alpine)
              export CC=aarch64-linux-musl-gcc
              export CXX=aarch64-linux-musl-g++
              ;;
          esac
          export AR=aarch64-linux-musl-ar
          export RANLIB=aarch64-linux-musl-ranlib
        fi

        ./configure $BUILD_ARGS

    - name: Build
      shell: bash
      working-directory: node
      run: |
        make -j$(nproc)

    - name: Show ccache stats
      shell: bash
      run: |
        ccache --show-stats

    - name: Package build cache
      shell: bash
      run: |
        mkdir artifact
        cp -r node artifact/node
        cp -r .ccache artifact/.ccache

    - name: Create archive
      shell: bash
      run: |
        tar -cf - artifact | brotli > node-${{ inputs.node_version }}-${{ inputs.os }}-${{ inputs.arch }}.tar.br

    - name: Upload Cache
      uses: actions/cache@v4
      with:
        key: ${{ github.run_id }}-${{ inputs.node_version }}-${{ inputs.os }}-${{ inputs.arch }}
        path: node-${{ inputs.node_version }}-${{ inputs.os }}-${{ inputs.arch }}.tar.br
