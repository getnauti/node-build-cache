name: Build Node.js Cache

on:
  push:
    branches:
      - '*'
      - '**'
      - '*/*'

permissions:
  contents: write

jobs:
  build-universal:
    strategy:
      matrix:
        node_version: ["24.16.0"]
        target:
          - { os: "linux", arch: "x64", runner: "ubuntu-24.04" }
          - { os: "linux", arch: "arm64", runner: "ubuntu-24.04-arm" }
          # - { os: "alpine", arch: "x64", runner: "ubuntu-24.04" }
          - { os: "alpine", arch: "arm64", runner: "ubuntu-24.04" }
          # - { os: "linuxstatic", arch: "x64", runner: "ubuntu-24.04" }
          - { os: "linuxstatic", arch: "arm64", runner: "ubuntu-24.04" }
          - { os: "windows", arch: "x64", runner: "windows-2022" }
          - { os: "windows", arch: "arm64", runner: "windows-11-arm" }
          - { os: "darwin", arch: "x64", runner: "macos-15-intel" }
          - { os: "darwin", arch: "arm64", runner: "macos-15" }

    runs-on: ${{ matrix.target.runner }}

    steps:
      - name: Checkout actions
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare-environment
        with:
          node_version: ${{ matrix.node_version }}
          os: ${{ matrix.target.os }}
          arch: ${{ matrix.target.arch }}

      - name: Configure (Linux/Darwin)
        working-directory: node
        if: ${{ matrix.target.os != 'windows' }}
        run: |
          ./configure $BUILD_ARGS

      - name: Build (Linux)
        working-directory: node
        if: ${{ matrix.target.os != 'windows' && matrix.target.os != 'darwin' }}
        run: |
          make -j$(nproc)

      - name: Build (Darwin)
        working-directory: node
        if: ${{ matrix.target.os == 'darwin' }}
        run: |
          make -j$(sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: ${{ matrix.target.os == 'windows' }}
        working-directory: node
        run: |
          cmd /c "vcbuild.bat ${{ matrix.target.arch }} full-icu ccache %GITHUB_WORKSPACE%\ccache-bin"

      - name: Package build cache
        shell: bash
        run: |
          mkdir artifact
          cp -r node artifact/node
          ls -al .ccache
          cp -r .ccache artifact/.ccache

      - name: Create archive
        shell: bash
        run: |
          tar -czf node-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz artifact
          split -b 1024M node-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz node-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.part.

      - name: Release
        uses: softprops/action-gh-release@v1
        if: github.ref_name == 'master'
        with:
          files: |
            node-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.part.*
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: build-${{ github.run_id }}
          name: Build ${{ github.run_id }}

