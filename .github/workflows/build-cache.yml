  aggregation-artifacts:
    needs:
      - build-linux-standard-and-static-libc-arm64
      - build-linux-static-libc-x64

    strategy:
      matrix:
        node_version: ["24.16.0"]
        target:
          - { os: "linux", arch: "arm64", runner: "ubuntu-24.04-arm" }
          - { os: "alpine", arch: "arm64", runner: "ubuntu-24.04-arm" }
          - { os: "linuxstatic", arch: "arm64", runner: "ubuntu-24.04-arm" }

    runs-on: ubuntu

    steps:
      - name: Restore Cache
        uses: actions/cache@v4
        with:
          key: ${{ github.run_id }}-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: node-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.br

      - name: Release
        uses: softprops/action-gh-release@v1
        if: github.ref_name == 'master'
        with:
          files: |
            ./*.tar.br
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: build-${{ github.run_id }}
          name: Build ${{ github.run_id }}
