name: Build Node.js Cache

on:
  push:
    branches:
      - '*'
      - '**'
      - '*/*'

permissions:
  contents: write
  discussions: write

jobs:
  load-matrix:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.load.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - id: load
        shell: bash
        run: |
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: load-matrix

    env:
      ACTIONS_STEP_DEBUG: true

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.target.runner }}

    steps:
      - name: Checkout actions
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare-environment
        with:
          node_version: ${{ matrix.node_version }}
          os: ${{ matrix.target.os }}
          arch: ${{ matrix.target.arch }}
          runner: ${{ matrix.target.runner }}

      - name: Configure (Linux/Darwin)
        working-directory: node
        if: ${{ matrix.target.os != 'windows' }}
        run: |
          ./configure $BUILD_ARGS

      - name: Configure (Linux MUSL)
        working-directory: node
        if: ${{ matrix.target.os == 'linuxstatic' || matrix.target.os == 'alpine' }}
        run: |
          sed -i 's/crsT/crs/g' out/Makefile

      - name: Make (Linux/Darwin)
        working-directory: node
        if: ${{ matrix.target.os != 'windows' }}
        run: |
          make -j$JOBS

      - name: Cleanup (Darwin)
        working-directory: node
        if: ${{ matrix.target.os == 'darwin' }}
        run: |
          find out -name "*.dSYM" -exec rm -rf {} \; || true
          sudo rm -rf /Applications/Xcode.app || true
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/* || true
          rm -rf ~/Library/Developer/Xcode/DerivedData || true

      - name: Build (Windows)
        if: ${{ matrix.target.os == 'windows' }}
        working-directory: node
        run: |
          cmd /c "vcbuild.bat ${{ matrix.target.arch }} static full-icu ccache %GITHUB_WORKSPACE%\ccache-bin"

      - name: Create archive (Linux/Darwin)
        shell: bash
        if: ${{ matrix.target.os != 'windows' }}
        working-directory: node
        run: |
          ls -alh
          tar czvf ../libnode-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz $(find out -type f -name '*.a')

      - name: Create archive (Windows)
        shell: bash
        if: ${{ matrix.target.os == 'windows' }}
        working-directory: node
        run: |
          ls -alh
          tar czvf ../libnode-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz $(find out -type f -name '*.lib')

      - name: Cleanup source code and list archive
        shell: bash
        run: |
          rm -rf node || true
          ls -alh

      - name: Split package
        shell: bash
        run: |
          split -b 1900M libnode-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz libnode-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.part.
          ls -lh *.part.*

      - name: Release
        id: release0
        continue-on-error: true
        uses: softprops/action-gh-release@v3
        with:
          name: Build ${{ github.run_id }}
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: build-${{ github.run_id }}
          make_latest: true
          files: |
            libnode-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.part.*

      - name: Release (Retry 1)
        id: release1
        if: steps.release0.outcome == 'failure'
        continue-on-error: true
        uses: softprops/action-gh-release@v3
        with:
          name: Build ${{ github.run_id }}
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: build-${{ github.run_id }}
          make_latest: true
          files: |
            libnode-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.part.*

      - name: Release (Retry 2)
        id: release2
        continue-on-error: true
        if: steps.release1.outcome == 'failure'
        uses: softprops/action-gh-release@v3
        with:
          name: Build ${{ github.run_id }}
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: build-${{ github.run_id }}
          make_latest: true
          files: |
            libnode-${{ matrix.node_version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}.tar.gz.part.*

      - name: Fail if release still failed
        if: |
          steps.release0.outcome == 'failure' &&
          steps.release1.outcome == 'failure' &&
          steps.release2.outcome == 'failure'
        run: exit 1
